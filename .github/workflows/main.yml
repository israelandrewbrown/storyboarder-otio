name: Build Cross-Platform Executables

on:
  push:
  pull_request:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install Linux packaging dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y icnsutils graphicsmagick

      - name: Install dependencies
        run: npm install

      - name: Build Linux artifacts (AppImage + deb)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder build --linux AppImage deb --x64 --publish never

      - name: Build macOS artifacts (dmg)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder build --mac dmg --x64 --publish never

      - name: Build Windows artifacts (installer + portable)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder build --win nsis portable --x64 --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: storyboarder-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/latest*.yml
          if-no-files-found: error
